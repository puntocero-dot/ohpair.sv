<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh Pair | Vintage-Tech E-commerce</title>
    <meta name="description" content="Premium footwear with a vintage soul and tech efficiency.">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="fade-in">
        <nav class="container flex-center" style="justify-content: space-between; padding-top: 2rem; padding-bottom: 2rem;">
            <div class="logo">
                <h1 style="font-size: 1.5rem;">OH PAIR</h1>
            </div>
            <div class="nav-links" style="display: flex; gap: 2rem; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;">
                <a href="#">Collection</a>
                <a href="#">About</a>
                <a href="#" id="cart-toggle">Cart (0)</a>
                <button id="theme-toggle" style="font-size: 0.8rem; border: 1px solid var(--border-soft); padding: 4px 8px;">Paper Dark</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero fade-in" style="margin-top: 4rem; margin-bottom: 8rem; text-align: center;">
            <p style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.3em; margin-bottom: 1rem; color: var(--text-secondary);">New Archive Collection</p>
            <h2 style="font-size: 5rem; line-height: 0.9;">The Art of <br><em>Walking</em></h2>
        </section>

        <section id="product-grid" class="fade-in" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 4rem;">
            <!-- Products will be injected by app.js -->
        </section>
    </main>

    <footer class="container" style="margin-top: 10rem; padding-bottom: 4rem; border-top: 1px solid var(--border-soft); padding-top: 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h3 style="margin-bottom: 1rem;">Newsletter</h3>
                <div style="display: flex; gap: 1rem;">
                    <input type="email" placeholder="Email Address" style="background: transparent; border: none; border-bottom: 1px solid var(--text-primary); padding: 0.5rem; font-family: var(--font-serif); font-style: italic; width: 250px;">
                    <button style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em;">Join</button>
                </div>
            </div>
            <div style="text-align: right; font-size: 0.7rem; color: var(--text-secondary); line-height: 2;">
                <p>&copy; 2026 OH PAIR SV</p>
                <p>Designed for the Editorial Soul.</p>
            </div>
        </div>
    </footer>

    <!-- Ordering Agent Panel -->
    <div id="ordering-agent" style="position: fixed; top: 0; right: -100%; width: 400px; height: 100vh; background-color: var(--bg-cream); border-left: 1px solid var(--border-soft); z-index: 10000; transition: var(--transition-slow); padding: 3rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem;">
            <h3 style="font-style: italic;">Your Order</h3>
            <button id="close-agent" style="font-size: 1.5rem;">&times;</button>
        </div>
        <div id="cart-content">
            <p style="font-family: var(--font-serif); font-style: italic; color: var(--text-secondary);">Your cart is currently empty.</p>
        </div>
        <div id="checkout-section" style="position: absolute; bottom: 3rem; left: 3rem; right: 3rem; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; border-top: 1px solid var(--border-soft); padding-top: 1rem;">
                <span style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em;">Total</span>
                <span id="total-price" style="font-family: var(--font-serif);">$0.00</span>
            </div>
            <button id="stripe-checkout" style="width: 100%; background-color: var(--text-primary); color: white; padding: 1.5rem; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem;">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Script Injection -->
    <script src="app.js"></script>
</body>
</html>
